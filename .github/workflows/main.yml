on:
  push:
    branches:
    - main

jobs:
  my_job:
    name: deploy to production
    runs-on: self-hosted
    steps:
    - run: |
        tmux send -t runnerBackendTesting:pane C-c
        tmux send -t runnerBackendTesting:pane "cd ~/backend_testing" ENTER
        tmux send -t runnerBackendTesting:pane "git pull" ENTER
        tmux send -t runnerBackendTesting:pane "cd ~/backend_testing/src" ENTER
        tmux send -t runnerBackendTesting:pane "dotnet ef database update" ENTER
        tmux send -t runnerBackendTesting:runTests "cd ~/backend_testing" ENTER
        tmux send -t runnerBackendTesting:runTests "sleep 5 && dotnet test" ENTER
        tmux send -t runnerBackend:pane C-c
        tmux send -t runnerBackend:pane "cd ~/backend" ENTER
        tmux send -t runnerBackend:pane "git pull" ENTER
        tmux send -t runnerBackend:pane "cd ~/backend/src" ENTER
        tmux send -t runnerBackend:pane "dotnet ef database update" ENTER
        tmux send -t runnerBackend:pane "dotnet run" ENTER
