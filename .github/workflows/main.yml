on:
  push:
    branches:
    - main

jobs:
  my_job:
    name: deploy to production
    runs-on: self-hosted
    steps:
    - run: |
        tmux send -t runnerBackend:pane C-c
        tmux send -t runnerBackend:pane "cd ~/backend" ENTER
        tmux send -t runnerBackend:pane "git pull" ENTER
        tmux send -t runnerBackend:pane "cd ~/backend/src" ENTER
        tmux send -t runnerBackend:pane "dotnet ef database update" ENTER
        tmux send -t runnerBackend:pane "dotnet run -e ASPNETCORE_ENVIRONMENT=development" ENTER
