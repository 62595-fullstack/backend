on:
  push:
    branches:
    - main

jobs:
  my_job:
    name: deploy to production
    runs-on: self-hosted
    steps:
    - run: |
        tmux attach-session -t runner
        cd ~/backend
        git pull
        cd ~/backend/src
        dotnet run -e ASPNETCORE_ENVIRONMENT=development
        tmux detach-session
