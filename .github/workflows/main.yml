on:
  push:
    branches:
    - main

jobs:
  my_job:
    name: deploy to production
    runs-on: self-hosted
    steps:
    - run: |
        tmux send -t runner:pane "cd ~/backend" ENTER
        tmux send -t runner:pane "git pull" ENTER
        tmux send -t runner:pane "cd ~/backend/src" ENTER
        tmux send -t runner:pane "dotnet run -e ASPNETCORE_ENVIRONMENT=development" ENTER
